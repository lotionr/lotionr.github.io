<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Lochan Reddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e14;
      --border:    #1e2435;
      --gold:      #FDB515;
      --text:      #c9d1d9;
      --text-dim:  #8b949e;
      --text-bright: #e6edf3;
      --nav-h:     60px;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'Fira Code', monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* NAV */
    nav {
      height: var(--nav-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      flex-shrink: 0;
      background: var(--bg);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-logo:hover { color: #ffc93c; }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      text-decoration: none;
      font-family: var(--font-mono);
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--gold); }
    .nav-back svg { width: 14px; height: 14px; }

    .nav-right { display: flex; gap: 0.75rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .btn-primary { background: var(--gold); color: #0b0e14; }
    .btn-primary:hover { background: #ffc93c; color: #0b0e14; transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 1.5px solid var(--gold);
    }
    .btn-outline:hover { background: rgba(253,181,21,0.1); transform: translateY(-1px); }

    /* PDF EMBED */
    .pdf-wrap {
      flex: 1;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Mobile fallback */
    .mobile-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      height: 100%;
      padding: 2rem;
      text-align: center;
    }
    .mobile-fallback p {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .pdf-wrap { display: none; }
      .mobile-fallback { display: flex; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <a href="/" class="nav-logo">LR</a>
      <a href="/" class="nav-back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
    </div>
    <div class="nav-right">
      <a href="resume.pdf" target="_blank" rel="noopener" class="btn btn-outline">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open
      </a>
      <a href="resume.pdf" download="Lochan_Reddy_Resume.pdf" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </a>
    </div>
  </nav>

  <div class="pdf-wrap">
    <iframe src="resume.pdf" title="Lochan Reddy Resume"></iframe>
  </div>

  <div class="mobile-fallback">
    <p>PDF preview isn't available on mobile.</p>
    <a href="resume.pdf" target="_blank" rel="noopener" class="btn btn-outline">Open PDF</a>
    <a href="resume.pdf" download="Lochan_Reddy_Resume.pdf" class="btn btn-primary">Download</a>
  </div>

</body>
</html>
